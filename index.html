<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Kiểm Tra: Sales Trực Booth Destino Centro</title>
    <style>
        :root { --primary: #0284c7; --bg: #f0f9ff; --text: #0f172a; --border: #cbd5e1; --success: #16a34a; --danger: #dc2626; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 800px; width: 100%; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        
        .header-box { text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 20px; margin-bottom: 20px; }
        .header-box h1 { color: var(--primary); font-size: 24px; margin: 0 0 10px 0; text-transform: uppercase; }
        .header-box p { margin: 0; font-weight: bold; color: #475569; }

        input[type="text"] { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; margin-top: 8px; margin-bottom: 20px; box-sizing: border-box; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; width: 100%; transition: 0.2s; }
        button:hover { background: #0369a1; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }

        .timer-container { text-align: right; margin-bottom: 20px; position: sticky; top: 10px; background: white; padding: 10px; border-radius: 8px; border: 1px solid #fee2e2; z-index: 100; display: flex; justify-content: flex-end; align-items: center; gap: 10px;}
        .timer-text { font-size: 18px; font-weight: bold; color: #475569; }
        .timer { font-size: 24px; font-weight: bold; color: var(--danger); display: inline-block; }
        
        .question-block { margin-bottom: 25px; padding: 20px; border: 1px solid var(--border); border-radius: 8px; background: #fafaf9; }
        .q-title { font-size: 17px; font-weight: bold; margin-bottom: 15px; line-height: 1.5; }
        .options label { display: block; padding: 12px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 10px; cursor: pointer; background: #fff; transition: 0.2s; }
        .options label:hover { border-color: var(--primary); }
        .options input[type="radio"] { margin-right: 10px; transform: scale(1.2); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h1>Bài Test: Sales Trực Booth Destino Centro</h1>
        <p>30 Câu Hỏi | 30 Phút | Ngưỡng đạt: 24/30</p>
    </div>

    <!-- MÀN HÌNH ĐĂNG NHẬP -->
    <div id="auth-screen">
        <h3 style="text-align: center; margin-bottom: 20px;">Vui lòng nhập thông tin nhân sự</h3>
        <label>Họ và tên nhân viên:</label>
        <input type="text" id="username" placeholder="Nhập họ và tên..." required>
        <label>Sàn / Đại lý:</label>
        <input type="text" id="useragency" placeholder="Nhập tên Sàn/Đại lý phân phối..." required>
        <button onclick="startQuiz()">Bắt Đầu Làm Bài</button>
    </div>

    <!-- MÀN HÌNH LÀM BÀI -->
    <div id="quiz-screen" class="hidden">
        <div class="timer-container">
            <span class="timer-text">Thời gian còn lại: </span>
            <span class="timer" id="time-left">30:00</span>
        </div>
        <div id="questions-container">
            <!-- Render câu hỏi bằng JS -->
        </div>
        <button id="btn-submit" onclick="submitQuiz()" style="background: var(--success); margin-top: 20px; font-size: 18px;">NỘP BÀI</button>
    </div>

    <!-- MÀN HÌNH KẾT QUẢ -->
    <div id="result-screen" class="hidden" style="text-align: center;">
        <h2 id="result-title" style="color: var(--success); font-size: 32px;">Đã ghi nhận kết quả!</h2>
        <div id="final-score" style="font-size: 24px; font-weight: bold; margin: 20px 0;"></div>
        <p id="pass-status" style="font-size: 18px; font-weight: bold; padding: 10px; border-radius: 8px;"></p>
        <p style="color: #64748b; margin-top: 20px;">Hệ thống đã tự động đẩy kết quả thi về máy chủ.</p>
    </div>
</div>

<script>
    // LINK GOOGLE APPS SCRIPT
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwEmFmiUskt0rFO85u8dw1ZQkQcBdPvF24hKI9_WVYTuk4kZczBFfvbVxPynDpb6vMVKQ/exec"; 
    
    const DURATION_MINUTES = 30; 
    const PASSING_SCORE = 24;
    const LOCK_MINUTES = 90; // Phạt chờ 90 phút nếu thi rớt

    
    // BỘ ĐỀ THI BM-TEST-DC-03 CHÍNH THỨC
    let QUIZ_DATA = [
        { id: "q1", question: "Theo trang dự án, Destino Centro tọa lạc tại địa chỉ nào?", options: { A: "54 Quốc lộ 50, huyện Cần Giuộc, tỉnh Long An", B: "54 Quốc lộ 1A, xã Mỹ Yên, huyện Bến Lức, tỉnh Long An", C: "27 Quốc lộ 13, phường 26, quận Bình Thạnh, TP.HCM", D: "54 Quốc lộ 1A, huyện Bình Chánh, TP.HCM" }, correct: "B" },
        { id: "q2", question: "Dự án sở hữu vị trí chiến lược ngay mặt tiền tuyến đường nào?", options: { A: "Quốc lộ 1A", B: "Quốc lộ 50", C: "Cao tốc Bến Lức - Long Thành", D: "Quốc lộ 13" }, correct: "A" },
        { id: "q3", question: "Theo trang dự án, chỉ mất khoảng bao lâu để cư dân di chuyển tới Trung tâm Quận 1 hoặc Khu đô thị Phú Mỹ Hưng?", options: { A: "Khoảng 5 phút", B: "Khoảng 60 phút", C: "Khoảng 25 phút", D: "Khoảng 10 phút" }, correct: "C" },
        { id: "q4", question: "Trong các tiện ích ngoại khu được liệt kê, địa điểm nào GẦN dự án nhất (thời gian di chuyển ngắn nhất)?", options: { A: "Chợ Bình Chánh - 5 phút", B: "Co.op Mart Bến Lức - 5 phút", C: "Bến xe Miền Tây - 15 phút", D: "Chợ Gò Đen - 2 phút" }, correct: "D" },
        { id: "q5", question: "Theo quy hoạch được nêu, tuyến Metro mới nào sẽ chạy qua khu vực dự án?", options: { A: "Tuyến An Sương - Thủ Dầu Một", B: "Tuyến Bến Thành - Suối Tiên", C: "Tuyến Cát Linh - Hà Đồng", D: "Tuyến Hưng Nhơn - Tân An" }, correct: "D" },
        { id: "q6", question: "Giá trị dự án đang được 'bảo chứng' bởi tầm nhìn quy hoạch nào?", options: { A: "Quy hoạch vùng Đông Nam Bộ đến năm 2040", B: "Quy hoạch TP.HCM đến năm 2030", C: "Quy hoạch sân bay Long Thành giai đoạn 2", D: "Quy hoạch tỉnh Long An đến năm 2050 (đẩy mạnh giao thông - logistics)" }, correct: "D" },
        { id: "q7", question: "Theo trang dự án, chủ đầu tư của Destino Centro là ai?", options: { A: "Vingroup", B: "Seaholdings", C: "Nam Long Group", D: "Hưng Thịnh Corp" }, correct: "B" },
        { id: "q8", question: "Loại hình sản phẩm của dự án là gì?", options: { A: "Đất nền phân lô", B: "Căn hộ chung cư và Shophouse", C: "Officetel và condotel nghỉ dưỡng", D: "Biệt thự và nhà phố liên kế" }, correct: "B" },
        { id: "q9", question: "Tổng số căn hộ của dự án là bao nhiêu?", options: { A: "3.500 căn hộ", B: "5.000 căn hộ", C: "2.048 căn hộ", D: "1.024 căn hộ" }, correct: "C" },
        { id: "q10", question: "Tổng diện tích khu đất dự án là bao nhiêu?", options: { A: "12.565 m²", B: "215.650 m²", C: "21.565 m²", D: "50.000 m²" }, correct: "C" },
        { id: "q11", question: "Phát biểu nào ĐÚNG về quy mô căn hộ theo thông tin dự án?", options: { A: "Tất cả căn đều là studio 25 m²", B: "Diện tích căn hộ khoảng 36 - 70 m², quy mô 1 - 2 phòng ngủ", C: "Diện tích cố định 90 m², 3 phòng ngủ", D: "Diện tích 100-200 m², quy mô 3-4 phòng ngủ" }, correct: "B" },
        { id: "q12", question: "Dự án gồm những tháp (block) nào theo mặt bằng công bố?", options: { A: "T1A, T1B, T2A, T2B và T3", B: "S1, S2, S3, S4 và S5", C: "Eleva 1, 2, 3, 4 và 5", D: "A, B, C, D và E" }, correct: "A" },
        { id: "q13", question: "Mặt bằng căn hộ điển hình (lặp lại) của dự án áp dụng cho khoảng tầng nào?", options: { A: "Chỉ tầng 1", B: "Toàn bộ từ tầng 1-5", C: "Tầng 3-20 (riêng tầng 2 có mặt bằng khác)", D: "Chỉ tầng 20-25" }, correct: "C" },
        { id: "q14", question: "Số phòng tắm (WC) trong mỗi căn hộ dao động ở mức nào?", options: { A: "1-2 WC", B: "Tối thiểu 3 WC", C: "3-4 WC", D: "Luôn là 1 WC" }, correct: "A" },
        { id: "q15", question: "Khu vực khối đế của dự án nổi bật với loại hình kinh doanh nào?", options: { A: "Chợ đầu mối nông sản", B: "Nhà xưởng và kho bãi", C: "Bãi đậu xe tải liên tỉnh", D: "Dãy shophouse sầm uất, hội tụ nhiều thương hiệu" }, correct: "D" },
        { id: "q16", question: "Theo '10 giá trị vàng', hệ số sử dụng đất của dự án được nêu ở mức nào?", options: { A: "Cao, khoảng 15 lần", B: "Thấp, khoảng 5.8 lần", C: "Khoảng 20 lần", D: "Không được công bố" }, correct: "B" },
        { id: "q17", question: "Mô hình khu ở của dự án được mô tả là gì?", options: { A: "Khu compound khép kín cao cấp", B: "Khu dân cư mở, không rào chắn", C: "Khu nhà ở xã hội", D: "Khu tái định cư" }, correct: "A" },
        { id: "q18", question: "Thông điệp 'Căn hộ giá trị tương lai - bán giá hiện tại' hàm ý điều gì với nhà đầu tư?", options: { A: "Giá đã được đẩy lên mức tương lai", B: "Mua ở mặt bằng giá hiện tại và kỳ vọng giá trị gia tăng theo hạ tầng, quy hoạch tương lai", C: "Chỉ bán cho khách trả góp dài hạn", D: "Giá sẽ giảm dần theo thời gian" }, correct: "B" },
        { id: "q19", question: "Theo trang dự án, hệ thống hồ bơi nội khu gồm mấy hồ?", options: { A: "2 hồ bơi", B: "6 hồ bơi", C: "4 hồ bơi tràn bờ", D: "1 hồ bơi" }, correct: "C" },
        { id: "q20", question: "Trường mầm non nội khu của dự án có tên là gì?", options: { A: "Destino Kids", B: "Sea School", C: "Centro Montessori", D: "Seakids" }, correct: "D" },
        { id: "q21", question: "Ngoài hồ bơi, hai tiện ích rèn luyện thân - tâm được nêu là gì?", options: { A: "Phòng gym hiện đại và không gian yoga", B: "Sân tennis và sân bóng rổ", C: "Đường đua xe đạp và sân golf", D: "Bể sục jacuzzi và phòng xông hơi" }, correct: "A" },
        { id: "q22", question: "Tiện ích nào sau đây KHÔNG được nêu trong hệ tiện ích của dự án?", options: { A: "Sân golf 18 lỗ", B: "Hệ thống 4 hồ bơi tràn bờ", C: "Trường mầm non Seakids", D: "Phòng gym & không gian yoga" }, correct: "A" },
        { id: "q23", question: "Nội dung nào sau đây KHÔNG thuộc '10 giá trị vàng' của dự án?", options: { A: "Hệ số sử dụng đất thấp", B: "Pháp lý minh bạch", C: "Cam kết lợi nhuận cho thuê tối thiểu 15%/năm", D: "Đối tác chiến lược tầm cỡ - uy tín" }, correct: "C" },
        { id: "q24", question: "Trang dự án cập nhật tiến độ thi công đến thời điểm nào?", options: { A: "Tháng 06.2026", B: "Tháng 01.2025", C: "Tháng 09.2026", D: "Tháng 12.2024" }, correct: "A" },
        { id: "q25", question: "Số hotline chính thức của Seaholdings trên trang dự án là?", options: { A: "0909 000 111", B: "1900 1234", C: "028 3840 0009 (chỉ là số tổng đài trụ sở)", D: "0909 333 447" }, correct: "D" },
        { id: "q26", question: "Trụ sở của Công ty CP Bất động sản Seaholdings đặt tại đâu?", options: { A: "27 Quốc lộ 13, phường 26, quận Bình Thạnh, TP.HCM", B: "54 Quốc lộ 1A, huyện Bến Lức, Long An", C: "Khu đô thị Phú Mỹ Hưng, Quận 7, TP.HCM", D: "Số 1 Đồng Khởi, Quận 1, TP.HCM" }, correct: "A" },
        { id: "q27", question: "Khách có con nhỏ hỏi 'dự án có chỗ học cho bé không?'. Cách tư vấn phù hợp & đúng thông tin nhất?", options: { A: "Khuyên khách tự tìm trường bên ngoài", B: "Khẳng định dự án có đủ trường từ mầm non đến đại học ngay nội khu", C: "Giới thiệu trường mầm non nội khu Seakids, đồng thời nêu các trường đại học lân cận trong bán kính di chuyển ngắn theo thông tin dự án", D: "Nói rằng dự án không có tiện ích giáo dục" }, correct: "C" },
        { id: "q28", question: "Khách e ngại 'ở Long An là xa trung tâm'. Cách xử lý thuyết phục & đúng dữ liệu dự án nhất?", options: { A: "Nói rằng khoảng cách không quan trọng", B: "Đồng ý là dự án bất tiện và xin lỗi khách", C: "Cam kết chắc chắn 10 phút là tới Quận 1", D: "Dẫn thông tin thật: mặt tiền QL1A, 25 phút tới Q1/Phú Mỹ Hưng, gần chợ - KCN - bệnh viện, đón đầu Metro Hưng Nhơn - Tân An & quy hoạch Long An 2050" }, correct: "D" },
        { id: "q29", question: "Khách quan tâm không gian thư giãn - rèn luyện sức khỏe. Sales nên giới thiệu tiện ích nào của dự án?", options: { A: "Sân golf và bến du thuyền nội khu", B: "Sân vận động và đường đua F1", C: "Khu trượt patin và rạp chiếu phim riêng", D: "Hệ thống 4 hồ bơi tràn bờ, phòng gym hiện đại, không gian yoga và quảng trường trung tâm" }, correct: "D" },
        { id: "q30", question: "Nhà đầu tư hỏi về tiềm năng tăng giá. Cách trả lời chuyên nghiệp & đúng chuẩn nhất?", options: { A: "Khẳng định lợi nhuận cho thuê tối thiểu 15%/năm", B: "Phân tích yếu tố hạ tầng theo thông tin dự án (mặt tiền QL1A, Metro Hưng Nhơn - Tân An, quy hoạch Long An 2050) một cách trung thực, không cam kết con số lợi nhuận cụ thể", C: "Cam kết chắc chắn giá tăng gấp đôi sau 1 năm", D: "Nói rằng bất động sản luôn thắng, cứ mua là lời" }, correct: "B" }
    ];

    
    let timerInterval;
    let timeRemaining = DURATION_MINUTES * 60;
    let isSubmitting = false;

    // THUẬT TOÁN XÁO TRỘN ĐỀ THI
    function shuffleQuestions(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startQuiz() {
        const name = document.getElementById('username').value.trim();
        const agency = document.getElementById('useragency').value.trim();
        if (!name || !agency) { alert("Vui lòng nhập đầy đủ Họ tên và Sàn/Đại lý phân phối!"); return; }

        // --- BẮT ĐẦU CHECK 90 PHÚT ---
        // Tạo khóa định danh theo tên và đại lý (viết thường hết để chống nhập hoa/thường)
        const lockKey = `lock_${name.toLowerCase()}_${agency.toLowerCase()}`;
        const lockedTime = localStorage.getItem(lockKey);
        
        if (lockedTime) {
            const now = new Date().getTime();
            if (now < parseInt(lockedTime)) {
                // Tính số phút còn lại phải chờ
                const diffMs = parseInt(lockedTime) - now;
                const diffMins = Math.ceil(diffMs / (60 * 1000));
                
                alert(`⚠️ Khoan đã bồ ơi!\nLần trước bồ thi chưa đạt. Vui lòng ôn lại bài kỹ hơn và quay lại sau ${diffMins} phút nữa nhé!`);
                return; // Ngăn không cho thi tiếp
            } else {
                // Nếu đã qua 90 phút thì xóa khóa để cho thi lại
                localStorage.removeItem(lockKey);
            }
        }
        // --- KẾT THÚC CHECK ---

        shuffleQuestions(QUIZ_DATA);

        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');

        renderQuestions();
        
        // ĐỒNG HỒ "TÂM LINH" TROLL NGƯỜI THI
        timerInterval = setInterval(() => {
            timeRemaining--;
            let timerEl = document.getElementById('time-left');

            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                timerEl.innerText = "00:00";
                alert("Hết giờ làm bài! Hệ thống tự động nộp bài.");
                processSubmission();
                return;
            }

            let isGlitching = Math.random() < 0.25; 

            if (isGlitching) {
                let fakeM = Math.floor(Math.random() * 4);
                let fakeS = Math.floor(Math.random() * 99);
                timerEl.innerText = `${fakeM < 10 ? '0'+fakeM : fakeM}:${fakeS < 10 ? '0'+fakeS : fakeS}`;
                
                timerEl.style.color = "red";
                timerEl.style.transform = `scale(${1 + Math.random() * 0.4}) rotate(${Math.random() * 10 - 5}deg)`;
                timerEl.style.textShadow = "2px 2px 5px rgba(255,0,0,0.6)";
                timerEl.style.transition = "0.1s"; 
            } else {
                let m = Math.floor(timeRemaining / 60);
                let s = timeRemaining % 60;
                timerEl.innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
                
                timerEl.style.color = "var(--danger)";
                timerEl.style.transform = "scale(1) rotate(0deg)";
                timerEl.style.textShadow = "none";
            }
        }, 1000);
    }

    function renderQuestions() {
        const container = document.getElementById('questions-container');
        let html = "";
        
        QUIZ_DATA.forEach((q, index) => {
            let optionsHtml = "";
            for (let key in q.options) {
                optionsHtml += `
                    <label>
                        <input type="radio" name="${q.id}" value="${key}"> 
                        <strong>${key}.</strong> ${q.options[key]}
                    </label>
                `;
            }
            html += `
                <div class="question-block" id="block-${q.id}">
                    <div class="q-title">Câu ${index + 1}: ${q.question}</div>
                    <div class="options">${optionsHtml}</div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function submitQuiz() {
        if (!confirm("Chắc chắn muốn nộp bài chứ?")) return;
        processSubmission();
    }

    function processSubmission() {
        if(isSubmitting) return; 
        isSubmitting = true;
        clearInterval(timerInterval);
        
        const btnSubmit = document.getElementById('btn-submit');
        btnSubmit.innerText = "ĐANG XỬ LÝ ĐẨY LÊN SHEET...";
        btnSubmit.disabled = true;

        let score = 0;
        let userAnswers = {};
        
        QUIZ_DATA.forEach((q) => {
            const selected = document.querySelector(`input[name="${q.id}"]:checked`);
            const ans = selected ? selected.value : "Chưa trả lời";
            userAnswers[q.id] = ans;
            if (ans === q.correct) score++;
        });

        const name = document.getElementById('username').value;
        const phone = document.getElementById('useragency').value; 
        
        const isPass = score >= PASSING_SCORE;

        // --- LƯU PHẠT 90 PHÚT NẾU RỚT ---
        if (!isPass) {
            const lockKey = `lock_${name.toLowerCase()}_${phone.toLowerCase()}`;
            // Thời gian hiện tại + (90 phút * 60 giây * 1000 ms)
            const lockTime = new Date().getTime() + (LOCK_MINUTES * 60 * 1000); 
            localStorage.setItem(lockKey, lockTime);
        }
        // ---------------------------------

        const payload = new URLSearchParams();
        payload.append("name", name);
        payload.append("phone", phone);
        payload.append("score", score);
        payload.append("totalQuestions", QUIZ_DATA.length);
        payload.append("answers", JSON.stringify(userAnswers));

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', 
            body: payload
        }).then(() => {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            document.getElementById('final-score').innerText = `Điểm thi: ${score} / ${QUIZ_DATA.length}`;
            
            const statusEl = document.getElementById('pass-status');
            const titleEl = document.getElementById('result-title');
            
            if (isPass) {
                titleEl.innerText = "Chúc Mừng!";
                titleEl.style.color = "var(--success)";
                statusEl.innerText = "🎉 ĐẠT YÊU CẦU";
                statusEl.style.backgroundColor = "#dcfce7";
                statusEl.style.color = "var(--success)";
            } else {
                titleEl.innerText = "Rất Tiếc!";
                titleEl.style.color = "var(--danger)";
                statusEl.innerText = "❌ CHƯA ĐẠT YÊU CẦU (Bị khóa thi 90 phút)";
                statusEl.style.backgroundColor = "#fee2e2";
                statusEl.style.color = "var(--danger)";
            }
            
        }).catch(err => {
            console.error("Lỗi:", err);
            alert("Đã gửi bài! Vui lòng kiểm tra lại kết nối nếu bảng điểm chưa hiện.");
        });
    }
</script>

</body>
</html>
